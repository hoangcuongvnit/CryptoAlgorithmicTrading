global:
  scrape_interval: 15s        # Default scrape interval
  evaluation_interval: 15s    # How often to evaluate rules
  external_labels:
    monitor: 'crypto-trading-system'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'executor-api'
    static_configs:
      - targets: ['localhost:9091']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'risk-guard-api'
    static_configs:
      - targets: ['localhost:9092']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'strategy-worker'
    static_configs:
      - targets: ['localhost:9093']
    metrics_path: '/metrics'
    scrape_interval: 5s
