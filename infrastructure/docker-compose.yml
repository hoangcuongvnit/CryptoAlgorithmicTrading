services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: trading_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-trader}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-strongpassword}
      - POSTGRES_DB=${POSTGRES_DB:-cryptotrading}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-cryptotrading}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - trading_network

  # ── Core Trading Services ─────────────────────────────────────────────────

  riskguard:
    build:
      context: ..
      dockerfile: src/Services/RiskGuard/RiskGuard.API/Dockerfile
    container_name: trading_riskguard
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Redis__Connection=trading_redis:6379
      - ConnectionStrings__Postgres=Host=trading_postgres;Port=5432;Database=${POSTGRES_DB:-cryptotrading};Username=${POSTGRES_USER:-trader};Password=${POSTGRES_PASSWORD:-strongpassword}
      - Risk__MinRiskReward=${MIN_RISK_REWARD:-2.0}
      - Risk__MaxPositionSizePercent=${MAX_POSITION_SIZE_PERCENT:-2.0}
      - Risk__VirtualAccountBalance=${INITIAL_BALANCE:-10000}
      - Risk__MaxDrawdownPercent=${MAX_DRAWDOWN_PERCENT:-5.0}
      - Risk__CooldownSeconds=${COOLDOWN_SECONDS:-30}
      - Risk__PaperTradingOnly=${PAPER_TRADING_MODE:-true}
      - RISKGUARD_REDIS_ENABLED=${RISKGUARD_REDIS_ENABLED:-true}
      - RISKGUARD_REDIS_TTL_SECONDS=${RISKGUARD_REDIS_TTL_SECONDS:-86400}
      - RISKGUARD_REDIS_SYNC_INTERVAL=${RISKGUARD_REDIS_SYNC_INTERVAL:-60}
    ports:
      - "5013:5013"
      - "5093:5093"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5093/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  executor:
    build:
      context: ..
      dockerfile: src/Services/Executor/Executor.API/Dockerfile
    container_name: trading_executor
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Trading__PaperTradingMode=${PAPER_TRADING_MODE:-true}
      - Binance__ApiKey=${BINANCE_API_KEY}
      - Binance__ApiSecret=${BINANCE_API_SECRET}
      - Binance__UseTestnet=${BINANCE_USE_TESTNET:-true}
      - Redis__Connection=trading_redis:6379
      - ConnectionStrings__Postgres=Host=trading_postgres;Port=5432;Database=${POSTGRES_DB:-cryptotrading};Username=${POSTGRES_USER:-trader};Password=${POSTGRES_PASSWORD:-strongpassword}
    ports:
      - "5014:5014"
      - "5094:5094"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5094/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notifier:
    build:
      context: ..
      dockerfile: src/Services/Notifier/Notifier.Worker/Dockerfile
    container_name: trading_notifier
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Redis__Connection=trading_redis:6379
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__ChatId=${TELEGRAM_CHAT_ID:-0}
    ports:
      - "5095:5094"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5094/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ingestor:
    build:
      context: ..
      dockerfile: src/Services/DataIngestor/Ingestor.Worker/Dockerfile
    container_name: trading_ingestor
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Trading__Symbols__0=BTCUSDT
      - Trading__Symbols__1=ETHUSDT
      - Trading__Symbols__2=BNBUSDT
      - Trading__Symbols__3=SOLUSDT
      - Trading__Symbols__4=XRPUSDT
      - Trading__KlineInterval=1m
      - Redis__Connection=trading_redis:6379
      - ConnectionStrings__Postgres=Host=trading_postgres;Port=5432;Database=${POSTGRES_DB:-cryptotrading};Username=${POSTGRES_USER:-trader};Password=${POSTGRES_PASSWORD:-strongpassword}
      - Binance__ApiKey=${BINANCE_API_KEY}
      - Binance__ApiSecret=${BINANCE_API_SECRET}
      - Binance__UseTestnet=${BINANCE_USE_TESTNET:-true}
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analyzer:
    build:
      context: ..
      dockerfile: src/Services/Analyzer/Analyzer.Worker/Dockerfile
    container_name: trading_analyzer
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Redis__Connection=trading_redis:6379
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  strategy:
    build:
      context: ..
      dockerfile: src/Services/Strategy/Strategy.Worker/Dockerfile
    container_name: trading_strategy
    depends_on:
      redis:
        condition: service_healthy
      riskguard:
        condition: service_healthy
      executor:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Redis__Connection=trading_redis:6379
      - Grpc__RiskGuardUrl=http://trading_riskguard:5013
      - Grpc__ExecutorUrl=http://trading_executor:5014
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build:
      context: ..
      dockerfile: src/Gateway/Gateway.API/Dockerfile
    container_name: trading_gateway
    depends_on:
      postgres:
        condition: service_healthy
      executor:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Postgres=Host=trading_postgres;Port=5432;Database=${POSTGRES_DB:-cryptotrading};Username=${POSTGRES_USER:-trader};Password=${POSTGRES_PASSWORD:-strongpassword}
      - RiskGuard__BaseUrl=http://trading_riskguard:5093
      - Notifier__BaseUrl=http://trading_notifier:5094
      - Executor__BaseUrl=http://trading_executor:5094
      - Dashboard__MaxRangeDaysFor1m=30
      - Dashboard__MaxRangeDaysForHigherIntervals=365
      - Dashboard__DefaultPageSize=100
      - Dashboard__MaxPageSize=500
      - Dashboard__CacheSeconds=20
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  historical-collector:
    build:
      context: ..
      dockerfile: src/Services/HistoricalCollector/HistoricalCollector.Worker/Dockerfile
    container_name: trading_historical_collector
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - HistoricalData__Enabled=${HISTORICAL_BACKFILL_ENABLED:-false}
      - HistoricalData__StartDate=${HISTORICAL_START_DATE:-2025-01-01}
      - HistoricalData__EndDate=${HISTORICAL_END_DATE:-2026-03-01}
      - HistoricalData__Interval=1m
      - HistoricalData__Symbols__0=BTCUSDT
      - HistoricalData__Symbols__1=ETHUSDT
      - HistoricalData__Symbols__2=BNBUSDT
      - HistoricalData__Symbols__3=SOLUSDT
      - HistoricalData__Symbols__4=XRPUSDT
      - GapFilling__Enabled=true
      - GapFilling__DailyCheckUtc=02:00
      - ConnectionStrings__Postgres=Host=trading_postgres;Port=5432;Database=${POSTGRES_DB:-cryptotrading};Username=${POSTGRES_USER:-trader};Password=${POSTGRES_PASSWORD:-strongpassword}
      - Binance__ApiKey=${BINANCE_API_KEY}
      - Binance__ApiSecret=${BINANCE_API_SECRET}
      - Binance__UseTestnet=${BINANCE_USE_TESTNET:-true}
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  housekeeper:
    build:
      context: ..
      dockerfile: src/Services/HouseKeeper/HouseKeeper.Worker/Dockerfile
    container_name: trading_housekeeper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=trading_postgres;Port=5432;Database=${POSTGRES_DB:-cryptotrading};Username=${POSTGRES_USER:-trader};Password=${POSTGRES_PASSWORD:-strongpassword}
      - HouseKeeper__Enabled=${HOUSEKEEPER_ENABLED:-true}
      - HouseKeeper__DryRun=${HOUSEKEEPER_DRY_RUN:-true}
      - HouseKeeper__ScheduleUtc=${HOUSEKEEPER_SCHEDULE_UTC:-03:15}
      - HouseKeeper__Retention__OrdersDays=${HOUSEKEEPER_RETENTION_ORDERS_DAYS:-365}
      - HouseKeeper__Retention__FilledGapsDays=${HOUSEKEEPER_RETENTION_GAPS_DAYS:-60}
      - HouseKeeper__Retention__PriceTicksMonths=${HOUSEKEEPER_RETENTION_TICKS_MONTHS:-12}
      - HouseKeeper__BatchSize=${HOUSEKEEPER_BATCH_SIZE:-5000}
      - HouseKeeper__MaxRunSeconds=${HOUSEKEEPER_MAX_RUN_SECONDS:-600}
    restart: unless-stopped
    networks:
      - trading_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  trading_network:
    driver: bridge

volumes:
  postgres_data:
